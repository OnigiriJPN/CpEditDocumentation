<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>注意事項 - CpEdit</title>
    <link rel="stylesheet" href="style.css">
    <script>
        const translations = {
            en: {
                title: "Notes - CpEdit",
                license: "License",
                licenseItems: [
                    "CpEdit is a self-made application.",
                    "cl.exe must be obtained from Visual Studio Community.",
                    "Distributing C++ compiler components via your own application is prohibited."
                ],
                installation: "Installation Notes",
                installationItems: [
                    "Run vs_community.exe with administrator privileges.",
                    "The default installation path is recommended.",
                    "The C++ workload consumes 10–12 GB of disk space for the standard configuration. Minimal configuration (Desktop Development) consumes 4–6 GB. Recommended free space: Minimal: 10 GB, Standard: 20–30 GB"
                ],
                execution: "Execution & Build Notes",
                executionItems: [
                    "Avoid using Japanese or special characters in project file paths.",
                    "If the path to cl.exe changes, builds will fail.",
                    "This application requires cl.exe to function."
                ],
                debug: "Debug Notes",
                debugItems: [
                    "Administrator privileges may be required when using JIT debugging.",
                    "Live editing of MFC forms may affect existing resources."
                ],
                limitations: "Known Limitations",
                limitationsItems: [
                    "Not fully compatible with Visual Studio.",
                    "Some Win32 API calls may have incomplete debug information."
                ]
            },
            ja: {
                title: "注意事項 - CpEdit",
                license: "ライセンス関連",
                licenseItems: [
                    "CpEditは自作アプリケーションです。",
                    "cl.exe は Visual Studio Community から入手してください。",
                    "C++コンパイラ部品を自作アプリ経由で配布するのは禁止です。"
                ],
                installation: "インストール時の注意",
                installationItems: [
                    "vs_community.exe は管理者権限で実行してください。",
                    "インストール先は既定推奨です。",
                    "C++ワークロードは標準構成で10~12GB空き容量、最小構成で4~6GB空き容量を消費します。推奨空き容量: 最小構成: 10GB、標準構成: 20~30GB"
                ],
                execution: "実行・ビルド時の注意",
                executionItems: [
                    "プロジェクトのファイルパスに日本語や特殊文字は避けてください。",
                    "cl.exe のパスが変更されるとビルドできません。",
                    "このアプリは cl.exe が必要です。"
                ],
                debug: "デバッグ関連",
                debugItems: [
                    "JITデバッグを使用する場合、管理者権限が必要なことがあります。",
                    "MFCフォームのライブ編集は既存リソースに影響する場合があります。"
                ],
                limitations: "既知の制限",
                limitationsItems: [
                    "Visual Studio と完全互換ではありません。",
                    "一部の Win32 API 呼び出しではデバッグ情報が不完全な場合があります。"
                ]
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;

            document.getElementById("license-title").innerText = t.license;
            const licList = document.getElementById("license-list");
            licList.innerHTML = "";
            t.licenseItems.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                licList.appendChild(li);
            });

            document.getElementById("installation-title").innerText = t.installation;
            const instList = document.getElementById("installation-list");
            instList.innerHTML = "";
            t.installationItems.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                instList.appendChild(li);
            });

            document.getElementById("execution-title").innerText = t.execution;
            const exeList = document.getElementById("execution-list");
            exeList.innerHTML = "";
            t.executionItems.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                exeList.appendChild(li);
            });

            document.getElementById("debug-title").innerText = t.debug;
            const dbgList = document.getElementById("debug-list");
            dbgList.innerHTML = "";
            t.debugItems.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                dbgList.appendChild(li);
            });

            document.getElementById("limitations-title").innerText = t.limitations;
            const limList = document.getElementById("limitations-list");
            limList.innerHTML = "";
            t.limitationsItems.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                limList.appendChild(li);
            });
        }

        document.addEventListener("DOMContentLoaded", () => setLanguage("ja"));
    </script>
</head>
<body>
    <header>
        <h1>注意事項</h1>
        <nav>
            <a href="index.html">Home</a>
            <button onclick="setLanguage('ja')">日本語</button>
            <button onclick="setLanguage('en')">EN</button>
        </nav>
    </header>
    <main>
        <h2 id="license-title">ライセンス関連</h2>
        <ul id="license-list"></ul>

        <h2 id="installation-title">インストール時の注意</h2>
        <ul id="installation-list"></ul>

        <h2 id="execution-title">実行・ビルド時の注意</h2>
        <ul id="execution-list"></ul>

        <h2 id="debug-title">デバッグ関連</h2>
        <ul id="debug-list"></ul>

        <h2 id="limitations-title">既知の制限</h2>
        <ul id="limitations-list"></ul>
    </main>
    <footer>
        <p>&copy; 2026 CpEdit</p>
    </footer>
</body>
</html>
