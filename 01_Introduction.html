        <p>CpEditor (略称 CpEdit) は、C++/MFC/Win32開発向けの軽量IDEです。</p>

        <h2>特徴</h2>
        <ul>
            <li>WPF UIで直感的操作</li>
            <li>cl.exeによるコンパイル統合</li>
